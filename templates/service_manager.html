{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление сервисами - КартаГид</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 400px; }
        .service-card { border: 1px solid #dee2e6; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .service-card:hover { background: #f8f9fa; }

        /* фикс для select на мобильных */
        .container {
            overflow: visible !important;
        }

        #serviceSelect {
            width: 100% !important;
            min-width: 0 !important;
        }

        /* скрываем атрибуцию карты */
        .leaflet-control-attribution {
            display: none !important;
        }

        @media (max-width: 768px) {
            /* заголовок и кнопки */
            .header-controls {
                flex-direction: column !important;
                align-items: flex-start !important;
                gap: 10px;
            }

            .header-controls h1 {
                font-size: 1.5rem !important;
                margin-bottom: 0;
            }

            .header-buttons {
                width: 100%;
                display: flex;
                gap: 10px;
            }

            .header-buttons .btn {
                flex: 1;
                text-align: center;
            }

            /* карточки сервисов */
            .service-card .card-content {
                flex-direction: column !important;
            }

            .service-card .card-actions {
                width: 100%;
                margin-top: 10px;
                display: flex;
                gap: 10px;
            }

            .service-card .card-actions .btn {
                flex: 1;
            }

            /* телефон не переносится */
            .phone-text {
                white-space: nowrap;
            }

            /* координаты */
            .coords-text {
                word-break: break-all;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4 header-controls">
            <h1 class="mb-0">Управление сервисами</h1>
            <div class="header-buttons">
                <button class="btn btn-success" onclick="openAddModal()">Добавить сервис</button>
                <button class="btn btn-success" onclick="openSpecsListModal()">Специализации</button>
                <a href="/" class="btn btn-secondary">Назад</a>
            </div>
        </div>

        <div id="services-list"></div>

        <hr class="my-4">
        <h2>Управление отзывами</h2>
        <div class="mb-3">
            <label class="form-label">Выберите сервис:</label>
            <select id="serviceSelect" class="form-select" onchange="loadReviews()">
                <option value="">-- Выберите сервис --</option>
            </select>
        </div>
        <button id="addReviewBtn" class="btn btn-success mb-3" onclick="openAddReviewModal()" disabled>Добавить отзыв</button>
        <div id="reviews-list"></div>
    </div>

    <!-- модальное окно отзыва -->
    <div class="modal fade" id="reviewModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="reviewModalTitle">Добавить отзыв</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="reviewForm">
                        <input type="hidden" id="reviewId">
                        <input type="hidden" id="reviewServiceId">
                        <div class="mb-3">
                            <label class="form-label">Автор *</label>
                            <input type="text" class="form-control" id="reviewAuthor" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Оценка *</label>
                            <select class="form-select" id="reviewRating" required>
                                <option value="5">⭐⭐⭐⭐⭐ (5)</option>
                                <option value="4">⭐⭐⭐⭐ (4)</option>
                                <option value="3">⭐⭐⭐ (3)</option>
                                <option value="2">⭐⭐ (2)</option>
                                <option value="1">⭐ (1)</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Текст отзыва *</label>
                            <textarea class="form-control" id="reviewText" rows="3" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Дата и время *</label>
                            <input type="datetime-local" class="form-control" id="reviewDate" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-primary" onclick="saveReview()">Сохранить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- модальное окно добавления/редактирования -->
    <div class="modal fade" id="serviceModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Добавить сервис</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="serviceForm">
                        <input type="hidden" id="serviceId">
                        <div class="row">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Название *</label>
                                    <input type="text" class="form-control" id="serviceName" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Телефон</label>
                                    <input type="text" class="form-control" id="servicePhone">
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-8 mb-3">
                                <label class="form-label">Адрес *</label>
                                <input type="text" class="form-control" id="serviceAddress" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Средний чек (₽)</label>
                                <input type="number" class="form-control" id="serviceAvgCheck">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Часы работы</label>
                            <input type="text" class="form-control" id="serviceHours">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Специализации</label>
                            <div id="specs-checkboxes" class="border rounded p-2" style="max-height: 150px; overflow-y: auto;">
                                <div class="text-muted small">Загрузка...</div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Координаты</label>
                            <div class="row">
                                <div class="col-md-6">
                                    <input type="number" step="0.000001" class="form-control" id="serviceLat" placeholder="Широта" required>
                                </div>
                                <div class="col-md-6">
                                    <input type="number" step="0.000001" class="form-control" id="serviceLng" placeholder="Долгота" required>
                                </div>
                            </div>
                        </div>
                        <div id="map" class="mb-3"></div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-primary" onclick="saveService()">Сохранить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- модальное окно списка специализаций -->
    <div class="modal fade" id="specsListModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Управление специализациями</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="specs-list"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-success" onclick="openAddSpecModal()">Добавить</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
                </div>
            </div>
        </div>
    </div>

    <!-- модальное окно добавления/редактирования специализации -->
    <div class="modal fade" id="specModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="specModalTitle">Добавить специализацию</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="specForm">
                        <input type="hidden" id="specId">
                        <div class="mb-3">
                            <label class="form-label">Название *</label>
                            <input type="text" class="form-control" id="specName" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-primary" onclick="saveSpec()">Сохранить</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="{% static 'js/service_manager.js' %}"></script>
</body>
</html>
